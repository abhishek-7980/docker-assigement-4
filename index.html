<!DOCTYPE html>
<html>
<head>
    <title>Coffee Shop</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f0e6;
        }
        header {
            background-color: #4e342e;
            color: white;
            padding: 15px;
        }
        .menu {
            margin: 20px;
        }
        .item {
            background: white;
            padding: 10px;
            margin: 10px auto;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 5px gray;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #4e342e;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>☕ Welcome to Abhi Coffee Shop</h1>
    <p>Fresh Brew, Fresh Mood!</p>
</header>

<div class="menu">
    <h2>Our Coffee Menu</h2>

    <div class="item">
        <h3>Espresso</h3>
        <p>Price: ₹120</p>
    </div>

    <div class="item">
        <h3>Cappuccino</h3>
        <p>Price: ₹150</p>
    </div>

    <div class="item">
        <h3>Latte</h3>
        <p>Price: ₹140</p>
    </div>

    <div class="item">
        <h3>Cold Coffee</h3>
        <p>Price: ₹160</p>
    </div>
</div>

<footer>
    <p>📍 Location: Nashik</p>
    <p>📞 Contact: 9876543210</p>
</footer>

</body>
</html>
