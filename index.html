<!DOCTYPE html>
<html>
<head>
    <title>Garden Shop</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #eaf7ea;
        }
        header {
            background-color: #2e7d32;
            color: white;
            padding: 15px;
        }
        .menu {
            margin: 20px;
        }
        .item {
            background: white;
            padding: 10px;
            margin: 10px auto;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 5px gray;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #2e7d32;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>🌿 Welcome to Abhi Garden Shop</h1>
    <p>Fresh Plants, Fresh Life!</p>
</header>

<div class="menu">
    <h2>Our Plants</h2>

    <div class="item">
        <h3>Rose Plant</h3>
        <p>Price: ₹150</p>
    </div>

    <div class="item">
        <h3>Tulsi Plant</h3>
        <p>Price: ₹50</p>
    </div>

    <div class="item">
        <h3>Aloe Vera</h3>
        <p>Price: ₹100</p>
    </div>

    <div class="item">
        <h3>Money Plant</h3>
        <p>Price: ₹80</p>
    </div>
</div>

<footer>
    <p>📍 Location: Nashik</p>
    <p>📞 Contact: 9876543210</p>
</footer>

</body>
</html>
